<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karpilo LoadIQ x FleetOS x Atlas System Reveal</title>
    <style>
      :root {
        color-scheme: dark;
        --blue: #35c8ff;
        --green: #39f58a;
        --panel: #06101b;
        --text: #eaf8ff;
        --muted: #91a8ba;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 0%, rgba(53, 200, 255, 0.18), transparent 34%),
          #020711;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 540px);
        display: grid;
        gap: 18px;
      }

      .screen,
      .panel {
        border: 1px solid rgba(53, 200, 255, 0.3);
        border-radius: 24px;
        background: rgba(6, 16, 27, 0.84);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.54);
      }

      .screen {
        padding: 12px;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 9 / 16;
        border-radius: 18px;
        background: #000;
      }

      .panel {
        padding: 16px;
      }

      p,
      h1 {
        margin: 0;
      }

      h1 {
        font-size: 21px;
        line-height: 1.15;
      }

      p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .signal {
        color: var(--green);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      a {
        min-height: 42px;
        width: fit-content;
        display: inline-flex;
        align-items: center;
        margin-top: 14px;
        border: 1px solid rgba(53, 200, 255, 0.4);
        border-radius: 999px;
        padding: 0 16px;
        color: var(--text);
        background: #071827;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="screen">
        <video
          controls
          playsinline
          preload="metadata"
          poster="./karpilo-system-reveal-poster.png"
          src="./karpilo-loadiq-fleetos-atlas-system-reveal.mp4"
        ></video>
      </section>
      <section class="panel">
        <p class="signal">Cinematic system reveal</p>
        <h1>Karpilo LoadIQ × FleetOS × Atlas / K-ATLS</h1>
        <p>
          A clean system-reveal trailer built from real app architecture,
          Atlas assets, runtime surfaces, calculator logic, and Supabase
          telemetry language.
        </p>
        <a href="./karpilo-loadiq-fleetos-atlas-system-reveal.mp4" download>Download MP4</a>
      </section>
    </main>
  </body>
</html>
